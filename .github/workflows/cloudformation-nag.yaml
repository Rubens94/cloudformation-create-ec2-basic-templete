name: DevSecOps IaC Pipeline

on: [push]

# 🔐 NECESARIO para OIDC
permissions:
  id-token: write
  contents: read

jobs:
  iac-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------------
      # 🔐 Autenticación segura con AWS (OIDC)
      # -------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::084311854915:role/Github-Actions
          aws-region: us-west-2

      # -------------------------------
      # ✅ Validación CloudFormation
      # -------------------------------
      - name: Validate CloudFormation templates
        run: |
          for file in templates/*.yml; do
            echo "Validating $file"
            aws cloudformation validate-template --template-body file://$file
          done

      # -------------------------------
      # 🔍 Seguridad con cfn-nag (Docker) ✅ FIX
      # -------------------------------
      - name: Run cfn-nag
        run: |
          docker run --rm -v ${{ github.workspace }}:/data \
          stelligent/cfn_nag \
          ruby /usr/local/bundle/bin/cfn_nag_scan \
          --input-path /data/templates \
          --fail-on-warnings

      # -------------------------------
      # 🔎 Checkov (IaC scanning)
      # -------------------------------
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: templates
          framework: cloudformation
          soft_fail: false

      # -------------------------------
      # 🛡️ Trivy (misconfig + secrets)
      # -------------------------------
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: templates/
          exit-code: 1