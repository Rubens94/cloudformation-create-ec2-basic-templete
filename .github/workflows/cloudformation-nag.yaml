name: Cloudformation nag
on: [push]
# on:
#   pull-request_target:
#     branches:
#       - main

jobs:
  cloudformation-nag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)" # Activar brew en la máquina de ubuntu
      - run: brew install ruby brew-gem # Instalar gem de ruby
      - run: brew gem install cfn-nag