name: Cloudformation nag
on: [push]

jobs:
  cloudformation-nag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'

      - name: Install cfn-nag
        run: |
          gem install cfn-nag

      - name: Security Scan
        run: cfn_nag_scan --input-path templates/