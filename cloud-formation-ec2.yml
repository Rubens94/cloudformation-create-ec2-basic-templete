AWSTemplateFormatVersion: '2010-09-09'

Resources:

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-west-2a
      ImageId: ami-0786adace1541ca80
      InstanceType: t3.micro
      KeyName: AWS-Ubuntu-server

      BlockDeviceMappings:
        - DeviceName: /dev/sdm
          Ebs:
            VolumeType: gp3
            VolumeSize: 20
            DeleteOnTermination: true

      SecurityGroups:
        - Ref: ServerSecurityGroup


  ServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH access

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0