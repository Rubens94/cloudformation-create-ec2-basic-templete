AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  MyKeyPair:
    Description: KeyPair para la instancia.
    Type: AWS::EC2::KeyPair::KeyName

  SecurityGroupIp:
    Description: Introduce la IP para hacer la whitelist en nuestro SG.
    Type: String
    Default: 0.0.0.0/0
    AllowedValues: 
      - 187.243.219.148/32
      - 0.0.0.0/0
    
  InstanceTypeParameter:
    Description: Enter t3.micro, m1.small, or m1.large. Default is t3.micro.
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - m1.small
      - m1.large

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-west-2a
      ImageId: ami-0786adace1541ca80
      InstanceType: !Ref InstanceTypeParameter
      KeyName: !Ref MyKeyPair

      BlockDeviceMappings:
        - DeviceName: /dev/sdm
          Ebs:
            VolumeType: gp3
            VolumeSize: 20
            DeleteOnTermination: true

      SecurityGroups:
        - !Ref ServerSecurityGroup

  ServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH access

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SecurityGroupIp